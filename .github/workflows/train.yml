name: ML Pipeline CI

on:
  push:
    branches: [ main ]

jobs:

  train-model:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run training pipeline
      run: |
        python src/train.py
